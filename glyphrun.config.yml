version: 1

artifactRoot: .glyphrun/runs
snapshotRoot: .glyphrun/snapshots

retention:
  keepRuns: 20

terminal:
  cols: 120
  rows: 36
  profile: xterm-256color
  normalize:
    trimRight: true
    normalizeLineEndings: true

artifacts:
  rawLog: true
  frames: true
  finalScreen: true
  snapshots: true
  agentContext: true
