version: "3"

vars:
  BINARY_NAME: minerva
  BUILD_DIR: ./bin
  MODULE: github.com/abdul-hamid-achik/minerva
  MAIN: ./cmd/minerva
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -s -w
    -X {{.MODULE}}/internal/version.Version={{.VERSION}}
    -X {{.MODULE}}/internal/version.Commit={{.COMMIT}}
    -X {{.MODULE}}/internal/version.Date={{.BUILD_TIME}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds: [task --list]
    silent: true

  fmt:
    desc: Format Go source
    cmds: [gofmt -s -w .]

  fmt-check:
    desc: Check Go formatting without changing files
    cmds:
      - test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)

  tidy-check:
    desc: Check module files without changing them
    cmds: [go mod tidy -diff]

  lint:
    desc: Lint Go source
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    cmds: [go test -count=1 ./...]

  race:
    desc: Run unit tests with the race detector
    env:
      CGO_ENABLED: "1"
    cmds: [go test -race -count=1 ./...]

  build:
    desc: Build the binary
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}

  run:
    desc: Build and run
    cmds:
      - task: build
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} {{.CLI_ARGS}}

  dev:
    desc: Run without building
    cmds:
      - go run {{.MAIN}} {{.CLI_ARGS}}

  install:
    desc: Install to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.MAIN}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  glyph:
    desc: Run Glyphrun self-specs for the Minerva CLI
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}
      - glyph run ./specs --format md

  glyph-fast:
    desc: Run fast Glyphrun specs (skip slow stack deep)
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}
      - >
        glyph run
        ./specs/version.yml
        ./specs/help.yml
        ./specs/stack_check_json.yml
        ./specs/init_and_skill.yml
        ./specs/evidence_docs.yml
        ./specs/library_and_profile.yml
        ./specs/status_and_bridge.yml
        ./specs/skill_update_compare.yml
        --format md

  docs:dev:
    desc: VitePress docs site (http://127.0.0.1:5173)
    cmds:
      - npm run docs:dev

  docs:build:
    desc: Build docs for Vercel / static hosting
    cmds:
      - npm run docs:build

  cairn:
    desc: Run Cairn browser specs (starts VitePress via tmux services on :5173)
    cmds:
      - cairn run ./browser-specs --format md

  cairn-preview:
    desc: Run Cairn against vitepress preview on :4173 (build first)
    cmds:
      - npm run docs:build
      - npm run docs:preview &
      - sleep 2
      - cairn run ./browser-specs --env preview --no-services --format md

  cairn-prod:
    desc: Run Cairn browser specs against https://minervacli.dev
    cmds:
      - cairn run ./browser-specs --env production --format md --no-services
